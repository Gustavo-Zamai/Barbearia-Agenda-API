spring.application.name=agenda
# ============================================
# CONFIGURACOES DO SERVIDOR
# ============================================
server.port=8080
# REMOVIDO: server.servlet.context-path=/api
# Motivo: todos os @RequestMapping dos controllers ja incluem "/api"
# (ex: @RequestMapping("/api/auth")). Manter o context-path=/api ao
# mesmo tempo duplicava o prefixo (URL real virava /api/api/auth/...),
# fazendo os matchers do SecurityConfig ("/api/auth/**") nao baterem
# com o path relativo que o Spring Security enxergava, resultando em
# 403 Forbidden vazio em rotas que deveriam ser publicas (como o login).
server.web.error.include-message=always
server.web.error.include-binding-errors=always

# ============================================
# CONFIGURACOES DO BANCO DE DADOS (MySQL)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/barbearia?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de Conexoes (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# CONFIGURACOES DO JPA/HIBERNATE
# ============================================
spring.jpa.database=MYSQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ============================================
# CONFIGURACOES DO FLYWAY
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.validate-on-migrate=true

# ============================================
# CONFIGURACOES DO JACKSON (JSON)
# ============================================
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ============================================
# CONFIGURACOES JWT
# ============================================
jwt.secret=chave-super-secreta-para-jwt-deve-ter-pelo-menos-32-caracteres-para-seguranca
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# CONFIGURACOES DE CORS
# ============================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true

# ============================================
# CONFIGURACOES DE LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.barbearia=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/barbearia-app.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================
# CONFIGURACOES DE EMAIL (para notificacoes)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seu-email@gmail.com
spring.mail.password=sua-senha-app
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# ============================================
# CONFIGURACOES DO SWAGGER (OpenAPI)
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true
springdoc.packages-to-scan=com.gsz.agenda.controller